name: Update GitHub Metrics

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Top languages (including private repos)
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: t7gs
          base: ""
          template: classic
          config_timezone: America/Sao_Paulo
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 30
          plugin_languages_analysis_timeout_repositories: 15
          plugin_languages_ignored: >-
            html, css, tex, less, dockerfile, makefile,
            qmake, lex, cmake, gnuplot
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 7
          plugin_languages_categories: programming, markup
          plugin_languages_colors: github
          plugin_languages_threshold: 0%
          plugin_languages_other: yes
          plugin_languages_sections: most-used
          repositories_affiliations: owner, collaborator, organization_member
          repositories_forks: no
          repositories_batch: 100
          commits_authoring: 45521703+t7gs@users.noreply.github.com, tigs4dev@gmail.com
